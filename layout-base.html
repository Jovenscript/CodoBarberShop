<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CodoBarberShop</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        accent: '#D4AF37'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="mobile.css">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111827">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Codo">
    
    <link rel="apple-touch-icon" href="apple-touch-icon.jpeg">
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('PWA: Service Worker registrado!'))
                    .catch(err => console.log('PWA: Erro no Service Worker', err));
            });
        }
    </script>
</head>

<body class="bg-gray-900 text-white min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-gray-800 p-6 hidden md:block">

        <h1 class="text-2xl font-bold text-accent mb-8">BarberFlow</h1>

        <nav>
            <ul class="space-y-4">
                <li><a href="dashboard.html" class="hover:text-accent transition">Dashboard</a></li>
                <li><a href="clientes.html" class="hover:text-accent transition">Clientes</a></li>
                <li><a href="agendamentos.html" class="hover:text-accent transition">Agendamentos</a></li>
                <li><a href="barbeiros.html" class="hover:text-accent transition">Barbeiros</a></li>
                <li><a href="perfil.html" class="hover:text-accent transition">Perfil</a></li>
                <li class="pt-6 border-t border-gray-700">
                    <a href="login.html" class="text-red-400 hover:text-red-300 transition">Sair</a>
                </li>
            </ul>
        </nav>

    </aside>

    <!-- Conteúdo principal -->
    <main class="flex-1 p-8">

        <header class="mb-8">
            <h2 class="text-3xl font-bold">TÍTULO DA PÁGINA</h2>
            <p class="text-gray-400 mt-2">Subtítulo da página</p>
        </header>

        <!-- CONTEÚDO DA PÁGINA AQUI -->

    </main>

</body>

</html>
