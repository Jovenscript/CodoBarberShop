<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BarberFlow | Cadastro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        accent: '#D4AF37'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="mobile.css">
</head>

<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

    <main class="w-full max-w-md bg-gray-800 p-8 rounded-2xl shadow-2xl">

        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-accent">BarberFlow</h1>
            <p class="text-gray-400 mt-2">Crie sua conta</p>
        </div>

        <form id="register-form" class="space-y-6">

            <div>
                <label class="block text-sm mb-2">Nome da Barbearia</label>
                <input 
                    type="text"
                    id="barbershop"
                    required
                    class="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-accent focus:outline-none"
                    placeholder="Ex: Barbearia do Marlon"
                >
            </div>

            <div>
                <label class="block text-sm mb-2">E-mail</label>
                <input 
                    type="email"
                    id="email"
                    required
                    class="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-accent focus:outline-none"
                    placeholder="Digite seu e-mail"
                >
            </div>

            <div>
                <label class="block text-sm mb-2">Senha</label>
                <input 
                    type="password"
                    id="password"
                    required
                    class="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-accent focus:outline-none"
                    placeholder="Crie uma senha"
                >
            </div>

            <button 
                type="submit"
                class="w-full bg-accent text-black font-semibold py-2 rounded-lg hover:opacity-90 transition"
            >
                Criar Conta
            </button>

        </form>

        <p class="text-center text-sm text-gray-400 mt-6">
            Já tem conta?
            <a href="login.html" class="text-accent hover:underline">
                Fazer login
            </a>
        </p>

    </main>

    <!-- Firebase + Register Script -->
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="register.js"></script>

</body>

</html>
