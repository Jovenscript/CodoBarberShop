<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BarberFlow | Agendamentos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        accent: '#D4AF37'
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-900 text-white min-h-screen flex">

    <aside class="w-64 bg-gray-800 p-6 flex flex-col justify-between">

        <div>
            <h1 id="shop-name-sidebar" class="text-2xl font-bold text-accent mb-10 italic">
                Carregando...
            </h1>

            <nav class="space-y-4">

                <a href="dashboard.html" class="block hover:text-accent transition">
                    Dashboard
                </a>

                <a href="clientes.html" class="block hover:text-accent transition">
                    Clientes
                </a>

                <a href="agendamentos.html" class="block text-accent font-semibold">
                    Agendamentos
                </a>

                <a href="barbeiros.html" class="block hover:text-accent transition">
                    Barbeiros
                </a>

                <a href="perfil.html" class="block hover:text-accent transition">
                    Perfil
                </a>

            </nav>
        </div>

        <button 
            id="logout-btn"
            class="text-red-400 hover:text-red-600 transition text-left"
        >
            Sair
        </button>

    </aside>

    <main class="flex-1 p-10">

        <h2 class="text-3xl font-bold mb-8">
            Agendamentos
        </h2>

        <div class="bg-gray-800 p-6 rounded-xl shadow-lg mb-10">

            <h3 class="text-xl font-semibold mb-6">
                Novo Agendamento
            </h3>

            <form id="appointment-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">

                <select 
                    id="appointment-client"
                    required
                    class="px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-accent focus:outline-none"
                >
                    <option value="">Selecione o Cliente</option>
                </select>

                <select 
                    id="appointment-barber"
                    required
                    class="px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-accent focus:outline-none"
                >
                    <option value="">Selecione o Barbeiro</option>
                </select>

                <input 
                    type="date"
                    id="appointment-date"
                    required
                    class="px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-accent focus:outline-none text-white color-scheme-dark" style="color-scheme: dark;"
                >

                <select 
                    id="appointment-time"
                    required
                    class="px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-accent focus:outline-none"
                >
                    <option value="">Selecione o Horário</option>
                </select>

                <select 
                    id="appointment-service"
                    required
                    class="px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-accent focus:outline-none"
                >
                    <option value="">Selecione o Serviço</option>
                </select>

                <input 
                    type="number" step="0.01"
                    id="appointment-price"
                    placeholder="Valor (R$)"
                    required readonly
                    class="px-4 py-2 rounded-lg bg-gray-600 border border-gray-500 text-gray-300 cursor-not-allowed focus:outline-none"
                >

                <button 
                    type="submit"
                    class="md:col-span-3 bg-accent text-black font-semibold py-2 rounded-lg hover:opacity-90 transition"
                >
                    Salvar Agendamento
                </button>

            </form>

        </div>

        <div class="bg-gray-800 p-6 rounded-xl shadow-lg">

            <h3 class="text-xl font-semibold mb-6">
                Lista de Agendamentos
            </h3>

            <div id="appointments-list" class="space-y-4">

                </div>

        </div>

    </main>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="appointments.js"></script>

</body>
</html>
