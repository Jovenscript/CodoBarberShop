<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>CodoBarberShop | Minha Agenda</title> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = { theme: { extend: { colors: { accent: '#D4AF37' } } } }
    </script>
    <link rel="stylesheet" href="mobile.css">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111827">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Codo">
    <link rel="apple-touch-icon" href="apple-touch-icon.jpeg">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('PWA: OK!'))
                    .catch(err => console.log('PWA: Erro', err));
            });
        }
    </script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex relative">

    <aside class="w-64 bg-gray-800 p-6 hidden md:flex flex-col justify-between border-r border-gray-700 h-screen sticky top-0">
        <div>
            <h1 id="shop-name-sidebar" class="text-2xl font-bold text-accent mb-10 italic">Carregando...</h1>
            <p class="text-xs text-gray-400 mb-6 uppercase tracking-widest font-bold">Área do Profissional</p>
            <nav class="space-y-4">
                <a href="painel-barbeiro.html" class="block text-accent font-semibold underline decoration-2 underline-offset-8">Minha Agenda Hoje</a>
                <a href="calendario.html" class="block hover:text-accent transition">Calendário & Folgas</a>
                <a href="perfil-barbeiro.html" class="block hover:text-accent transition">Meu Portfólio</a>
            </nav>
        </div>
        <button id="logout-btn" class="text-red-400 hover:text-red-600 transition text-left font-medium">Sair da Conta</button>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h2 class="text-2xl md:text-3xl font-bold">Olá, <span id="barber-name-title" class="text-accent">...</span></h2>
                <p class="text-gray-400 text-sm md:text-base">Aqui está a sua agenda e seus ganhos.</p>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="hidden md:block text-right bg-gray-800 px-6 py-3 rounded-xl border border-gray-700">
                    <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Sua Comissão Hoje</p>
                    <p id="barber-commission-total" class="text-2xl font-black text-green-500">R$ 0,00</p>
                </div>
                <button id="logout-btn-mobile" class="md:hidden bg-gray-800 p-3 rounded-full border border-gray-700 text-red-400">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <div class="md:hidden bg-gray-800 px-6 py-4 rounded-xl border border-gray-700 mb-8 flex justify-between items-center shadow-lg">
            <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Comissão Hoje</p>
            <p id="barber-commission-total-mobile" class="text-2xl font-black text-green-500">R$ 0,00</p>
        </div>

        <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700 mb-20 md:mb-0">
            <div class="flex justify-between items-center mb-6 border-b border-gray-700 pb-4">
                <h3 class="text-xl font-semibold">Meus Agendamentos</h3>
                <input type="date" id="filter-date" class="px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-accent focus:outline-none text-white color-scheme-dark" style="color-scheme: dark;">
            </div>

            <div id="appointments-list" class="space-y-4">
                <p class="text-gray-500 italic text-center text-sm py-4">Buscando sua agenda...</p>
            </div>
        </div>
    </main>

    <nav class="md:hidden fixed bottom-0 left-0 w-full bg-[#111827] border-t border-gray-800 z-50 px-6 py-2 flex justify-between items-end shadow-[0_-10px_30px_rgba(0,0,0,0.8)] pb-safe">
        
        <a href="painel-barbeiro.html" class="flex flex-col items-center gap-1 text-accent transform -translate-y-4">
            <div class="bg-gray-800 p-3 rounded-full border-2 border-accent shadow-[0_0_15px_rgba(212,175,55,0.4)]">
                <i data-lucide="calendar-clock" class="w-6 h-6"></i>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-widest mt-1">Agenda</span>
        </a>

        <a href="calendario.html" class="flex flex-col items-center gap-1 text-gray-500 hover:text-gray-300 pb-2">
            <i data-lucide="calendar-days" class="w-6 h-6"></i>
            <span class="text-[9px] font-bold uppercase tracking-widest">Folgas</span>
        </a>

        <a href="perfil-barbeiro.html" class="flex flex-col items-center gap-1 text-gray-500 hover:text-gray-300 pb-2">
            <i data-lucide="user" class="w-6 h-6"></i>
            <span class="text-[9px] font-bold uppercase tracking-widest">Portfólio</span>
        </a>
    </nav>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="painel-barbeiro.js"></script>
    <script>lucide.createIcons();</script>
    <script>
        setTimeout(() => {
            const btnMobile = document.getElementById('logout-btn-mobile');
            const btnPc = document.getElementById('logout-btn');
            if(btnMobile && btnPc) btnMobile.addEventListener('click', () => btnPc.click());
        }, 1000);
    </script>
</body>
</html>
