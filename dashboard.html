<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BarberFlow | Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { accent: '#D4AF37' } } } }
    </script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex">

    <aside class="w-64 bg-gray-800 p-6 flex flex-col justify-between border-r border-gray-700">
        <div>
            <h1 id="shop-name-sidebar" class="text-2xl font-bold text-accent mb-10 italic">Carregando...</h1>
            <nav class="space-y-4">
                <a href="dashboard.html" class="block text-accent font-semibold underline decoration-2 underline-offset-8">Dashboard</a>
                <a href="clientes.html" class="block hover:text-accent transition">Clientes</a>
                <a href="agendamentos.html" class="block hover:text-accent transition">Agendamentos</a>
                <a href="barbeiros.html" class="block hover:text-accent transition">Barbeiros</a>
                <a href="perfil.html" class="block hover:text-accent transition">Perfil</a>
            </nav>
        </div>
        <button id="logout-btn" class="text-red-400 hover:text-red-600 transition text-left font-medium">Sair da Conta</button>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <header class="mb-10">
            <h2 class="text-3xl font-bold">Painel de Controle</h2>
            <p class="text-gray-400">Visão geral da sua barbearia em tempo real.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <p class="text-gray-400 text-xs uppercase font-bold mb-2">Faturamento (7d)</p>
                <h3 id="total-revenue" class="text-2xl font-bold text-green-500">R$ 0,00</h3>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <p class="text-gray-400 text-xs uppercase font-bold mb-2">Total Clientes</p>
                <h3 id="total-clients" class="text-2xl font-bold text-white">0</h3>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <p class="text-gray-400 text-xs uppercase font-bold mb-2">Barbeiros</p>
                <h3 id="total-barbers" class="text-2xl font-bold text-white">0</h3>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <p class="text-gray-400 text-xs uppercase font-bold mb-2">Serviços Feitos</p>
                <h3 id="total-completed" class="text-2xl font-bold text-accent">0</h3>
            </div>
        </div>

        <div class="bg-gray-800 p-8 rounded-xl border border-gray-700 shadow-lg">
            <h4 class="text-lg font-semibold mb-6">Evolução do Faturamento (Últimos 7 dias)</h4>
            <div class="h-80">
                <canvas id="revenueChart"></canvas>
            </div>
        </div>
    </main>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="dashboard.js"></script>
</body>
</html>
