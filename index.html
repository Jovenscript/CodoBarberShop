<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BarberFlow</title> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: { extend: { colors: { accent: '#D4AF37' } } }
        }
    </script>
    <link rel="stylesheet" href="mobile.css">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111827">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Codo">
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('PWA: OK!'))
                    .catch(err => console.log('PWA: Erro', err));
            });
        }
    </script>
</head>

<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

    <main class="w-full max-w-md bg-gray-800 p-8 rounded-2xl shadow-2xl">

        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-accent">BarberFlow</h1>
            <p class="text-gray-400 mt-2">Sistema de Gestão para Barbearias</p>
        </div>

        <form id="login-form" class="space-y-6">

            <div>
                <label class="block text-sm mb-2">E-mail</label>
                <input 
                    type="email"
                    id="email"
                    required
                    class="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-accent focus:outline-none"
                    placeholder="Digite seu e-mail"
                >
            </div>

            <div>
                <label class="block text-sm mb-2">Senha</label>
                <input 
                    type="password"
                    id="password"
                    required
                    class="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-accent focus:outline-none"
                    placeholder="Digite sua senha"
                >
            </div>

            <button 
                type="submit"
                class="w-full bg-accent text-black font-semibold py-2 rounded-lg hover:opacity-90 transition"
            >
                Entrar
            </button>

        </form>

        <p class="text-center text-sm text-gray-400 mt-6">
            Não tem conta?
            <a href="cadastro.html" class="text-accent hover:underline">
                Criar conta
            </a>
        </p>

    </main>

    <!-- Firebase + Login Script -->
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="login.js"></script>

</body>
</html>
