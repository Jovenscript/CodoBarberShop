<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BarberFlow | Barbeiros</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { accent: '#D4AF37' } } } }
    </script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex">

    <aside class="w-64 bg-gray-800 p-6 flex flex-col justify-between">
        <div>
            <h1 id="shop-name-sidebar" class="text-2xl font-bold text-accent mb-10 italic">Carregando...</h1>
            <nav class="space-y-4">
                <a href="dashboard.html" class="block hover:text-accent transition">Dashboard</a>
                <a href="clientes.html" class="block hover:text-accent transition">Clientes</a>
                <a href="agendamentos.html" class="block hover:text-accent transition">Agendamentos</a>
                <a href="barbeiros.html" class="block text-accent font-semibold">Barbeiros</a>
                <a href="perfil.html" class="block hover:text-accent transition">Perfil</a>
            </nav>
        </div>
        <button id="logout-btn" class="text-red-400 hover:text-red-600 transition text-left">Sair</button>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <h2 class="text-3xl font-bold mb-8">Gestão de Barbeiros</h2>

        <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-yellow-600/30 mb-10">
            <h3 class="text-xl font-semibold mb-4 text-yellow-500 flex items-center gap-2">
                ⏳ Pedidos de Folga Pendentes
            </h3>
            <div id="time-off-list" class="space-y-3">
                <p class="text-xs text-gray-500 italic">Buscando pedidos...</p>
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-xl shadow-lg mb-10 border border-gray-700">
            <h3 class="text-xl font-semibold mb-2">Cadastrar Novo Profissional</h3>
            <p class="text-xs text-gray-400 mb-6 italic">Crie o acesso para o seu barbeiro entrar no sistema e ver a própria agenda.</p>

            <form id="barber-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="md:col-span-1">
                    <label class="block text-gray-400 text-[10px] uppercase font-bold mb-1">Nome</label>
                    <input type="text" id="barber-name" placeholder="Ex: João Silva" required class="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-accent focus:outline-none">
                </div>
                <div class="md:col-span-1">
                    <label class="block text-gray-400 text-[10px] uppercase font-bold mb-1">Telefone (WhatsApp)</label>
                    <input type="text" id="barber-phone" placeholder="Ex: 11999999999" required class="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-accent focus:outline-none">
                </div>
                <div class="md:col-span-1">
                    <label class="block text-gray-400 text-[10px] uppercase font-bold mb-1">Comissão (%)</label>
                    <input type="number" id="barber-commission" placeholder="Ex: 50" required class="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-accent focus:outline-none">
                </div>
                <div class="md:col-span-1">
                    <label class="block text-gray-400 text-[10px] uppercase font-bold mb-1">E-mail de Login</label>
                    <input type="email" id="barber-email" placeholder="barbeiro@email.com" required class="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-accent focus:outline-none">
                </div>
                <div class="md:col-span-1">
                    <label class="block text-gray-400 text-[10px] uppercase font-bold mb-1">Senha de Acesso</label>
                    <input type="password" id="barber-password" placeholder="Mínimo 6 caracteres" required minlength="6" class="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-accent focus:outline-none">
                </div>
                <div class="md:col-span-1 flex items-end">
                    <button type="submit" id="btn-save" class="w-full bg-accent text-black font-bold py-2 rounded-lg hover:opacity-90 transition h-[42px]">
                        Criar Conta
                    </button>
                </div>
            </form>
        </div>

        <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
            <h3 class="text-xl font-semibold mb-6">Equipe Cadastrada</h3>
            <div id="barbers-list" class="space-y-4"></div>
        </div>

    </main>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="barbers.js"></script>
</body>
</html>
