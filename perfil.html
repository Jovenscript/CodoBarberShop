<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BarberFlow | Perfil</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { accent: '#D4AF37' } } } }
    </script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex">

    <aside class="w-64 bg-gray-800 p-6 flex flex-col justify-between border-r border-gray-700">
        <div>
            <h1 class="text-2xl font-bold text-accent mb-10 italic">BarberFlow</h1>
            <nav class="space-y-4">
                <a href="dashboard.html" class="block hover:text-accent transition">Dashboard</a>
                <a href="clientes.html" class="block hover:text-accent transition">Clientes</a>
                <a href="agendamentos.html" class="block hover:text-accent transition">Agendamentos</a>
                <a href="barbeiros.html" class="block hover:text-accent transition">Barbeiros</a>
                <a href="perfil.html" class="block text-accent font-semibold underline decoration-2 underline-offset-8">Perfil</a>
            </nav>
        </div>
        <button id="logout-btn" class="text-red-400 hover:text-red-600 transition text-left font-medium">Sair da Conta</button>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <header class="mb-10">
            <h2 class="text-3xl font-bold">Configurações do Perfil</h2>
            <p class="text-gray-400 italic">Personalize como os seus clientes veem a sua barbearia.</p>
        </header>

        <div class="max-w-5xl grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="bg-gray-800 p-8 rounded-xl border border-gray-700 shadow-lg">
                
                <div class="mb-8 p-4 bg-accent/10 border border-accent/20 rounded-lg">
                    <label class="block text-accent text-xs font-bold uppercase mb-2 text-center">Seu Link de Agendamento Público</label>
                    <div class="flex gap-2">
                        <input type="text" id="public-link-input" readonly 
                            class="flex-1 bg-gray-900 border border-gray-700 px-3 py-2 rounded text-sm text-gray-300 outline-none">
                        <button id="copy-link-btn" class="bg-accent text-black px-4 py-2 rounded font-bold text-sm hover:opacity-90 transition">
                            Copiar
                        </button>
                    </div>
                </div>

                <form id="profile-form" class="space-y-6">
                    <div>
                        <label class="block text-gray-400 mb-2 text-sm uppercase font-bold">E-mail</label>
                        <input type="email" id="profile-email" disabled class="w-full px-4 py-3 rounded-lg bg-gray-900 border border-gray-700 text-gray-500 cursor-not-allowed outline-none">
                    </div>

                    <div>
                        <label class="block text-gray-400 mb-2 text-sm uppercase font-bold">Nome da Barbearia</label>
                        <input type="text" id="profile-shop-name" required class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-accent outline-none transition">
                    </div>

                    <div>
                        <label class="block text-gray-400 mb-2 text-sm uppercase font-bold">WhatsApp (Onde receberá as confirmações)</label>
                        <input type="text" id="profile-whatsapp" placeholder="Ex: 11999999999" required class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-accent outline-none transition">
                        <p class="text-[10px] text-gray-500 mt-1 italic">* Digite apenas números com DDD.</p>
                    </div>

                    <div>
                        <label class="block text-gray-400 mb-2 text-sm uppercase font-bold text-accent">URL da Foto de Fundo (Página do Cliente)</label>
                        <input type="url" id="profile-logo-url" placeholder="https://link-da-imagem.jpg" 
                            class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-accent outline-none transition">
                        <p class="text-[10px] text-gray-500 mt-1 italic">* Deixe em branco para usar o fundo padrão.</p>
                    </div>

                    <div class="pt-4 border-t border-gray-700">
                        <h3 class="text-accent font-semibold mb-4 text-sm uppercase tracking-widest">Expediente</h3>
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="block text-gray-500 text-[10px] uppercase mb-1">Abertura</label>
                                <input type="time" id="shop-open" required class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 outline-none color-scheme-dark" style="color-scheme: dark;">
                            </div>
                            <div>
                                <label class="block text-gray-500 text-[10px] uppercase mb-1">Fechamento</label>
                                <input type="time" id="shop-close" required class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 outline-none color-scheme-dark" style="color-scheme: dark;">
                            </div>
                        </div>
                    </div>

                    <button type="submit" id="btn-save-profile" class="w-full bg-accent text-black font-bold py-4 rounded-lg hover:opacity-90 transition transform active:scale-95 shadow-lg shadow-accent/20">
                        SALVAR ALTERAÇÕES
                    </button>
                </form>
            </div>

            <div class="bg-gray-800 p-8 rounded-xl border border-gray-700 shadow-lg flex flex-col">
                <h3 class="text-xl font-bold mb-6 text-accent border-b border-gray-700 pb-2">Gerenciar Serviços</h3>
                
                <form id="service-form" class="mb-6 flex flex-col gap-3">
                    <div class="flex gap-2 items-end">
                        <div class="flex-1">
                            <label class="block text-gray-400 mb-1 text-[10px] uppercase font-bold">Nome do Serviço</label>
                            <input type="text" id="service-name" placeholder="Ex: Corte + Barba" required class="w-full px-3 py-2 rounded-lg bg-gray-700 border border-gray-600 text-sm outline-none focus:border-accent">
                        </div>
                        <div class="w-24">
                            <label class="block text-gray-400 mb-1 text-[10px] uppercase font-bold">Valor (R$)</label>
                            <input type="number" step="0.01" id="service-price" placeholder="45.00" required class="w-full px-3 py-2 rounded-lg bg-gray-700 border border-gray-600 text-sm outline-none focus:border-accent">
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-1 text-[10px] uppercase font-bold">Descrição (Opcional)</label>
                        <input type="text" id="service-desc" placeholder="Ex: Degrade na navalha com toalha quente..." class="w-full px-3 py-2 rounded-lg bg-gray-700 border border-gray-600 text-sm outline-none focus:border-accent">
                    </div>
                    <button type="submit" class="bg-green-600 hover:bg-green-500 text-white font-bold py-2 px-4 rounded-lg transition text-sm">
                        Adicionar Serviço
                    </button>
                </form>

                <div class="flex-1 overflow-y-auto pr-2">
                    <ul id="services-list" class="space-y-3">
                        </ul>
                </div>
            </div>

        </div>
    </main>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="perfil.js"></script>
</body>
</html>
