<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BarberFlow | Meu Painel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { accent: '#D4AF37' } } } }
    </script>
    <link rel="stylesheet" href="mobile.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111827">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('PWA: Service Worker registrado!'))
                    .catch(err => console.log('PWA: Erro no Service Worker', err));
            });
        }
    </script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex">

    <aside class="w-64 bg-gray-800 p-6 flex flex-col justify-between border-r border-gray-700">
        <div>
            <h1 id="shop-name-sidebar" class="text-2xl font-bold text-accent mb-10 italic">Carregando...</h1>
            <p class="text-xs text-gray-400 mb-6 uppercase tracking-widest font-bold">Área do Profissional</p>
            <nav class="space-y-4">
                <a href="painel-barbeiro.html" class="block text-accent font-semibold underline decoration-2 underline-offset-8">Minha Agenda Hoje</a>
                
                <a href="calendario.html" class="block hover:text-accent transition">Calendário & Folgas</a>
            </nav>
        </div>
        <button id="logout-btn" class="text-red-400 hover:text-red-600 transition text-left font-medium">Sair da Conta</button>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-bold">Olá, <span id="barber-name-title" class="text-accent">...</span></h2>
                <p class="text-gray-400">Aqui está a sua agenda e seus ganhos.</p>
            </div>
            <div class="text-right bg-gray-800 px-6 py-3 rounded-xl border border-gray-700">
                <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Sua Comissão Hoje</p>
                <p id="barber-commission-total" class="text-2xl font-black text-green-500">R$ 0,00</p>
            </div>
        </header>

        <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
            <div class="flex justify-between items-center mb-6 border-b border-gray-700 pb-4">
                <h3 class="text-xl font-semibold">Meus Agendamentos</h3>
                <input type="date" id="filter-date" class="px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-accent focus:outline-none text-white color-scheme-dark" style="color-scheme: dark;">
            </div>

            <div id="appointments-list" class="space-y-4">
                <p class="text-gray-500 italic text-center text-sm py-4">Buscando sua agenda...</p>
            </div>
        </div>
    </main>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="painel-barbeiro.js"></script>
</body>

</html>
